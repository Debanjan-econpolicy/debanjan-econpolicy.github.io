<p class="pubs-section-label">Working Papers</p>

{% for post in site.publications reversed %}
<div class="pub-card">
  <span class="pub-status">Working Paper</span>
  <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
  <p class="pub-excerpt">{{ post.excerpt }}</p>
  <div class="pub-links">
    <a href="{{ post.url }}">View Abstract</a>
  </div>
</div>
{% endfor %}
